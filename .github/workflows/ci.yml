name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Tests + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Ruff check
        run: ruff check demand_mvp_radar/ tests/

      - name: Ruff format check
        run: ruff format --check demand_mvp_radar/ tests/

      - name: Portfolio evidence gate
        run: python -m pytest tests/test_portfolio_audit_evidence.py tests/test_mvp_of_week.py -q --tb=short

      - name: Pytest
        run: python -m pytest tests/ -q --tb=short
